{% extends "base.html" %}
{% block title %}蜂巢 — 新建 Channel{% endblock %}
{% block body_class %}page-admin page-editor{% endblock %}
{% block content %}
<main id="main-content" class="page-shell form-shell">
  <p class="crumb"><a href="/admin/">← Channel 列表</a></p>
  <header class="page-heading compact-heading">
    <div>
      <p class="eyebrow" lang="en">New stream</p>
      <h1>新建 Channel</h1>
      <p class="page-lede">先定义你真正关心的问题，再决定从哪里获取信号。</p>
    </div>
  </header>
  <section class="admin-panel">
    <form method="post" action="/admin/channels/new">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="field">
        <label for="new-channel-name">名字</label>
        <input id="new-channel-name" type="text" name="name" placeholder="例如：NZ Finance" required autocomplete="off">
      </div>
      <div class="field">
        <label for="new-channel-profile">关注什么</label>
        <textarea id="new-channel-profile" name="profile" placeholder="经济新闻、利率变化、房产市场动态、KiwiSaver 和省钱投资技巧。" required></textarea>
        <p class="hint">保存后可以继续调整，并为这个 Channel 添加信源。</p>
      </div>
      <div class="field">
        <label for="new-fetch-interval">抓取频率</label>
        <select id="new-fetch-interval" name="fetch_interval_hours">
          <option value="3">每 3 小时</option>
          <option value="6">每 6 小时</option>
          <option value="24">每天一次</option>
        </select>
      </div>
      <div class="actions">
        <button class="btn primary" type="submit">创建 Channel</button>
        <a class="btn ghost" href="/admin/">取消</a>
      </div>
    </form>
  </section>
</main>
{% endblock %}
